services:
  web:
    image: ghcr.io/fan1k413/minecraft-server-status-web:main
    pull_policy: always
    environment:
      APP_BASE_URL: https://status.windking.fans
      DATABASE_URL: file:/data/status.db
      SERVER_CONFIG_PATH: /config/server.yaml
    ports:
      - "15879:3000"
    volumes:
      - ./data:/data
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health/live').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    init: true
    stop_grace_period: 20s

  monitor:
    image: ghcr.io/fan1k413/minecraft-server-status-monitor:main
    pull_policy: always
    environment:
      DATABASE_URL: file:/data/status.db
      SERVER_CONFIG_PATH: /config/server.yaml
    volumes:
      - ./data:/data
      - ./config:/config:ro
    restart: unless-stopped
    init: true
    stop_grace_period: 20s

volumes:
  status-data:
